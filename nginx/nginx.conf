events {}

http {
    # Redirect all HTTP traffic to HTTPS
    server {
        listen 80;
        server_name bibliotab.com www.bibliotab.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name bibliotab.com www.bibliotab.com;

        # Point nginx to the Let's Encrypt certificates
        ssl_certificate /etc/letsencrypt/live/bibliotab.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bibliotab.com/privkey.pem;

        # All other requests go to the React frontend
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API requests go to the Node backend
        location /api/ {
            proxy_pass http://backend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
